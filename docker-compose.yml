version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: plant_disease_backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: plant_disease_frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    restart: unless-stopped